<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار المسلم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2330;
  --border: #30363d;
  --gold: #c9a84c;
  --gold2: #e8c86e;
  --gold-dim: rgba(201,168,76,0.13);
  --text: #e6edf3;
  --text-dim: #8b949e;
  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.15);
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font-scale: 1;
}
[data-theme="light"] {
  --bg: #f5f0e8;
  --surface: #ffffff;
  --surface2: #f0ebe0;
  --border: #d4c9a8;
  --gold: #a07828;
  --gold2: #7a5a18;
  --gold-dim: rgba(160,120,40,0.1);
  --text: #2c2416;
  --text-dim: #7a6840;
  --green: #2d8a3e;
  --green-dim: rgba(45,138,62,0.12);
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  transition:background .3s,color .3s;
}
[data-theme="dark"] body {
  background-image:
    radial-gradient(ellipse at 15% 10%,rgba(201,168,76,.06) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 85%,rgba(63,185,80,.04) 0%,transparent 45%);
}
[data-theme="light"] body {
  background-image:
    radial-gradient(ellipse at 15% 10%,rgba(160,120,40,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 85%,rgba(45,138,62,.05) 0%,transparent 45%);
}

/* ── header ── */
header{
  text-align:center;
  padding:40px 20px 24px;
  position:relative;
}
header::after{
  content:'';display:block;
  width:100px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:16px auto 0;
}
.bismillah{
  font-family:'Amiri',serif;
  font-size:clamp(18px,3.5vw,26px);
  color:var(--gold);
  margin-bottom:10px;
}
.site-title{
  font-size:clamp(26px,5vw,40px);
  font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{color:var(--text-dim);font-size:14px;margin-top:6px;font-weight:300;}

/* ── theme toggle ── */
.top-bar{
  display:flex;justify-content:flex-end;align-items:center;
  gap:10px;
  padding:12px 20px 0;
}
.theme-btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  width:42px;height:42px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  box-shadow:var(--shadow);
}
.theme-btn:hover{border-color:var(--gold);transform:rotate(20deg);}

.font-ctrl{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:50px;
  padding:4px 6px;
  box-shadow:var(--shadow);
}
.font-btn{
  background:none;border:none;
  color:var(--text-dim);
  width:32px;height:32px;
  border-radius:50%;
  cursor:pointer;
  font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  font-family:'Tajawal',sans-serif;
  line-height:1;
}
.font-btn:hover{background:var(--gold-dim);color:var(--gold);}
.font-btn:active{transform:scale(.88);}
.font-size-label{
  font-size:12px;color:var(--text-dim);
  min-width:32px;text-align:center;
  font-family:'Tajawal',sans-serif;
  pointer-events:none;
}

/* ── tabs ── */
.tabs{
  display:flex;justify-content:center;gap:12px;
  padding:20px 20px 28px;
}
.tab-btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-dim);
  padding:12px 40px;
  border-radius:50px;
  cursor:pointer;
  font-family:'Tajawal',sans-serif;
  font-size:16px;font-weight:600;
  transition:all .25s;
  box-shadow:var(--shadow);
}
.tab-btn:hover{border-color:var(--gold);color:var(--gold);}
.tab-btn.active{
  background:var(--gold-dim);
  border-color:var(--gold);
  color:var(--gold2);
}

/* ── progress ── */
.progress-wrap{
  max-width:680px;margin:0 auto 24px;padding:0 20px;
}
.progress-info{
  display:flex;justify-content:space-between;
  font-size:13px;color:var(--text-dim);margin-bottom:8px;
}
.progress-bar{
  height:6px;background:var(--surface2);
  border-radius:10px;overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--green));
  border-radius:10px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  width:0%;
}

/* ── grid ── */
.azkar-grid{
  max-width:680px;margin:0 auto;
  padding:0 16px 48px;
  display:flex;flex-direction:column;gap:14px;
}

/* ── card ── */
.zikr-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px 22px 16px;
  transition:all .2s;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.zikr-card:active:not(.done){
  transform:scale(.985);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.zikr-card::before{
  content:'';position:absolute;
  top:0;right:0;width:4px;height:100%;
  background:linear-gradient(180deg,var(--gold),transparent);
  opacity:.6;
}
.zikr-card.done{
  border-color:rgba(63,185,80,.35);
  opacity:.65;
}
[data-theme="light"] .zikr-card.done{
  border-color:rgba(45,138,62,.4);
}
.zikr-card.done::before{
  background:linear-gradient(180deg,var(--green),transparent);
}

.zikr-text{
  font-family:'Amiri',serif;
  font-size:calc(clamp(17px,3vw,22px) * var(--font-scale));
  line-height:2;
  transition:font-size .2s;
  color:var(--text);
  margin-bottom:8px;
}
.zikr-source{
  font-size:12px;color:var(--text-dim);
  margin-bottom:18px;
}

/* ── tasbih section ── */
.tasbih-section{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  padding-bottom:4px;
}

/* big circular tasbih button */
.btn-count{
  position:relative;
  width:96px;height:96px;
  border-radius:50%;
  cursor:pointer;
  border:none;
  background:conic-gradient(var(--gold) 0%, var(--gold) var(--pct,0%), var(--surface2) var(--pct,0%));
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:transform .12s, box-shadow .2s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 20px rgba(201,168,76,.2), inset 0 0 0 6px var(--surface);
  flex-shrink:0;
}
[data-theme="light"] .btn-count{
  box-shadow:0 4px 20px rgba(160,120,40,.18), inset 0 0 0 6px var(--surface);
}
.btn-count:active{
  transform:scale(.93);
  box-shadow:0 2px 10px rgba(201,168,76,.3), inset 0 0 0 6px var(--surface);
}
.btn-count-num{
  font-size:26px;font-weight:700;
  color:var(--gold2);
  font-family:'Tajawal',sans-serif;
  line-height:1;
  pointer-events:none;
}
.btn-count-label{
  font-size:11px;color:var(--text-dim);
  pointer-events:none;
  margin-top:2px;
}
.done .btn-count{
  background:conic-gradient(var(--green) 100%, var(--green) 100%);
  box-shadow:0 4px 20px rgba(63,185,80,.25), inset 0 0 0 6px var(--surface);
  cursor:default;
}
.done .btn-count-num{color:var(--green);}

/* dots */
.dots-row{
  display:flex;gap:6px;flex-wrap:wrap;
  justify-content:center;
  max-width:300px;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--border);
  transition:all .18s;
}
.dot.filled{
  background:var(--gold);
  box-shadow:0 0 5px rgba(201,168,76,.5);
}
[data-theme="light"] .dot.filled{
  box-shadow:0 0 5px rgba(160,120,40,.4);
}
.done .dot.filled{
  background:var(--green);
  box-shadow:0 0 5px rgba(63,185,80,.5);
}

.done-badge{
  display:none;align-items:center;
  gap:6px;color:var(--green);
  font-size:15px;font-weight:700;
}
.done .done-badge{display:flex;}

/* bottom row: reset */
.card-bottom{
  display:flex;align-items:center;
  justify-content:flex-end;
  margin-top:6px;
}
.btn-reset-one{
  background:none;border:none;
  color:var(--text-dim);cursor:pointer;
  font-size:13px;padding:4px 10px;
  border-radius:6px;
  transition:all .2s;
  font-family:'Tajawal',sans-serif;
}
.btn-reset-one:hover{
  color:var(--text);background:var(--surface2);
}

/* ── bottom reset ── */
.reset-wrap{text-align:center;padding:0 16px 48px;}
.btn-reset-all{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-dim);
  padding:12px 36px;
  border-radius:50px;
  cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:15px;
  transition:all .2s;
  box-shadow:var(--shadow);
}
.btn-reset-all:hover{border-color:#f85149;color:#f85149;}

/* ── celebrate ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  z-index:99;display:none;
}
.overlay.show{display:block;}
.celebration{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:var(--surface);
  border:1.5px solid var(--gold);
  border-radius:20px;
  padding:36px 52px;
  text-align:center;z-index:100;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}
.celebration.show{transform:translate(-50%,-50%) scale(1);}
.cel-icon{font-size:52px;margin-bottom:12px;}
.cel-title{color:var(--gold2);font-size:22px;font-weight:700;margin-bottom:8px;}
.cel-sub{color:var(--text-dim);font-size:14px;line-height:1.8;}
.btn-close-cel{
  margin-top:18px;
  background:var(--gold-dim);
  border:1px solid var(--gold);
  color:var(--gold2);
  padding:10px 28px;border-radius:50px;
  cursor:pointer;font-family:'Tajawal',sans-serif;font-size:15px;
}

.tab-content{display:none;}
.tab-content.active{display:block;}

@media(max-width:480px){
  .tabs{gap:8px;}
  .tab-btn{padding:10px 24px;font-size:15px;}
  .celebration{padding:28px 28px;}
}
</style>
</head>
<body data-theme="dark">

<div class="top-bar">
  <div class="font-ctrl">
    <button class="font-btn" onclick="changeFont(-1)" title="تصغير الخط">−A</button>
    <span class="font-size-label" id="fontLabel">150%</span>
    <button class="font-btn" onclick="changeFont(1)" title="تكبير الخط">+A</button>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="تبديل المظهر">🌙</button>
</div>

<header>
  <div class="bismillah">بسم الله الرحمن الرحيم</div>
  <div class="site-title">أذكار المسلم</div>
  <p class="subtitle">« فَاذْكُرُونِي أَذْكُرْكُمْ »</p>
</header>

<div class="tabs">
  <button class="tab-btn" id="tbtn-sabah" onclick="switchTab('sabah',this)">🌅 أذكار الصباح</button>
  <button class="tab-btn" id="tbtn-masaa" onclick="switchTab('masaa',this)">🌇 أذكار المساء</button>
</div>



<!-- SABAH -->
<div class="tab-content" id="tab-sabah">
  <div class="progress-wrap">
    <div class="progress-info"><span>التقدم</span><span id="prog-sabah">0 / 0</span></div>
    <div class="progress-bar"><div class="progress-fill" id="fill-sabah"></div></div>
  </div>
  <div class="azkar-grid" id="grid-sabah"></div>
</div>

<!-- MASAA -->
<div class="tab-content" id="tab-masaa">
  <div class="progress-wrap">
    <div class="progress-info"><span>التقدم</span><span id="prog-masaa">0 / 0</span></div>
    <div class="progress-bar"><div class="progress-fill" id="fill-masaa"></div></div>
  </div>
  <div class="azkar-grid" id="grid-masaa"></div>
</div>

<div class="reset-wrap">
  <button class="btn-reset-all" onclick="resetAll()">↺ إعادة تعيين الكل</button>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay()"></div>
<div class="celebration" id="celebration">
  <div class="cel-icon">✨</div>
  <div class="cel-title">أحسنت يا مسلم!</div>
  <div class="cel-sub">لقد أتممت جميع الأذكار<br>جعلها الله في ميزان حسناتك<br>وحفظك من كل شر</div>
  <button class="btn-close-cel" onclick="closeOverlay()">آمين 🤲</button>
</div>

<script>
const DATA = {
  sabah:[
    {
      text:"اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",

    },
    {
      text:"قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ",

    {
      text:"قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ",

    {
      text:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَهِ النَّاسِ ۝ مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ",

    },
    {
      text:"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ",

    {
      text:"اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ",
      source:"رواه الترمذي",count:1

    {
      text:"اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ",

      source:"رواه أبو داود",count:4
    },
    {
      text:"اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ، فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ",
      source:"رواه أبو داود",count:1
    },
    {
      text:"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ",
      source:"رواه أبو داود",count:3
    },

const state={sabah:{},masaa:{}};

function init(){
  Object.keys(DATA).forEach(tab=>{
    DATA[tab].forEach((_,i)=>state[tab][i]=0);
    buildGrid(tab);
  });
}

function buildGrid(tab){
  const grid=document.getElementById('grid-'+tab);
  grid.innerHTML='';
  DATA[tab].forEach((z,i)=>{
    const MAX=z.count;
    const showDots=MAX<=20;
    const dotsHTML=showDots
      ? '<div class="dots-row">'+Array.from({length:MAX},(_,d)=>
          `<div class="dot" id="d-${tab}-${i}-${d}"></div>`).join('')+'</div>'
      : '';
    const card=document.createElement('div');
    card.className='zikr-card';
    card.id='card-'+tab+'-'+i;
    // click anywhere on card = inc
    card.addEventListener('click', ()=>inc(tab,i));
    card.innerHTML=`
      <div class="zikr-text">${z.text.replace(/\n/g,'<br>')}</div>
      <div class="zikr-source">📖 ${z.source}</div>
      <div class="tasbih-section">
        <button class="btn-count" id="btn-${tab}-${i}" style="--pct:0%" onclick="event.stopPropagation();inc('${tab}',${i})">
          <span class="btn-count-num" id="cn-${tab}-${i}">0</span>
          <span class="btn-count-label">من ${MAX}</span>
        </button>
        ${dotsHTML}
        <div class="done-badge">✅ اكتمل</div>
      </div>
      <div class="card-bottom">
        <button class="btn-reset-one" onclick="event.stopPropagation();resetOne('${tab}',${i})">↺ إعادة</button>
      </div>`;
    grid.appendChild(card);
  });
  updateProg(tab);
}

function inc(tab,i){
  const MAX=DATA[tab][i].count;
  if(state[tab][i]>=MAX)return;
  // haptic
  if(navigator.vibrate) navigator.vibrate(18);
  state[tab][i]++;
  const cur=state[tab][i];
  document.getElementById('cn-'+tab+'-'+i).textContent=cur;
  // update ring
  const pct=Math.round(cur/MAX*100)+'%';
  const btn=document.getElementById('btn-'+tab+'-'+i);
  if(btn) btn.style.setProperty('--pct',pct);
  if(DATA[tab][i].count<=20){
    const dot=document.getElementById('d-'+tab+'-'+i+'-'+(cur-1));
    if(dot)dot.classList.add('filled');
  }
  if(cur>=MAX){
    document.getElementById('card-'+tab+'-'+i).classList.add('done');
    // scroll to next undone card
    setTimeout(()=>scrollToNext(tab,i),500);
  }
  updateProg(tab);
}

function scrollToNext(tab,i){
  const total=DATA[tab].length;
  for(let j=i+1;j<total;j++){
    if(state[tab][j]<DATA[tab][j].count){
      const nextCard=document.getElementById('card-'+tab+'-'+j);
      if(nextCard){
        nextCard.scrollIntoView({behavior:'smooth',block:'center'});
        // brief highlight
        nextCard.style.transition='box-shadow .15s';
        nextCard.style.boxShadow='0 0 0 2px var(--gold)';
        setTimeout(()=>{nextCard.style.boxShadow='';},700);
      }
      return;
    }
  }
}

function resetOne(tab,i){
  state[tab][i]=0;
  document.getElementById('cn-'+tab+'-'+i).textContent='0';
  document.getElementById('card-'+tab+'-'+i).classList.remove('done');
  const btn=document.getElementById('btn-'+tab+'-'+i);
  if(btn) btn.style.setProperty('--pct','0%');
  const MAX=DATA[tab][i].count;
  if(MAX<=20){
    for(let d=0;d<MAX;d++){
      const dot=document.getElementById('d-'+tab+'-'+i+'-'+d);
      if(dot)dot.classList.remove('filled');
    }
  }
  updateProg(tab);
}

function updateProg(tab){
  const total=DATA[tab].length;
  const done=DATA[tab].filter((_,i)=>state[tab][i]>=DATA[tab][i].count).length;
  document.getElementById('prog-'+tab).textContent=done+' / '+total;
  document.getElementById('fill-'+tab).style.width=(done/total*100)+'%';
  if(done===total&&total>0){ setTimeout(showCel,400); }
}

function showCel(){
  document.getElementById('overlay').classList.add('show');
  document.getElementById('celebration').classList.add('show');
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('celebration').classList.remove('show');
}
function resetAll(){
  Object.keys(DATA).forEach(tab=>DATA[tab].forEach((_,i)=>resetOne(tab,i)));
}

let curTab='sabah';
function switchTab(tab,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  curTab=tab;
}

function getDefaultTab(){
  const now=new Date();
  const h=now.getHours();
  const m=now.getMinutes();
  // صباح: من 3:30 صباحاً (3:30) حتى 3:30 عصراً (15:30)
  const totalMins=h*60+m;
  return (totalMins>=210 && totalMins<930)?'sabah':'masaa';
}

function applyDefaultTab(){
  const tab=getDefaultTab();
  const btn=document.getElementById('tbtn-'+tab);
  // remove active from all first
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  curTab=tab;
}

function toggleTheme(){
  const body=document.body;
  const isDark=body.dataset.theme==='dark';
  body.dataset.theme=isDark?'light':'dark';
  document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
}

let fontScale=1.5;
const fontSteps=[0.75,0.85,1,1.15,1.3,1.5,1.75];
let fontIdx=5;
function changeFont(dir){
  fontIdx=Math.max(0,Math.min(fontSteps.length-1,fontIdx+dir));
  fontScale=fontSteps[fontIdx];
  document.documentElement.style.setProperty('--font-scale',fontScale);
  document.getElementById('fontLabel').textContent=Math.round(fontScale*100)+'%';
}
// apply default on load
document.documentElement.style.setProperty('--font-scale',fontScale);

init();
applyDefaultTab();
</script>
